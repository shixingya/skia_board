<!DOCTYPE html>
<html>
<head>
  <title>SVG Button Examples</title>
  <style>
    .svg-button {
	
      background-color: rgba(87,126,252,0.6); /* 设置按钮背景为纯黑色 */
      background-repeat: no-repeat;
      background-size: contain;
      border: none;
      cursor: pointer;
      outline: none;
    }

    .svg-button-32 {
      width: 32px;
      height: 32px;
      background-image: url('D:/refresh.svg');
    }

    .svg-button-48 {
      width: 48px;
      height: 48px;
      background-image: url('D:/refresh.svg');
    }

    .svg-button-64 {
      width: 64px;
      height: 64px;
      background-image: url('D:/refresh.svg');
    }
  </style>
</head>
<body>
  <button class="svg-button svg-button-32"></button>
  <button class="svg-button svg-button-48"></button>
  <button class="svg-button svg-button-64"></button>
</body>
</html>
